# Prompt Reconstruction Engine — CI/CD
# Thin caller for the GLOBAL reusable pipeline. All logic lives in
# .github/workflows/reusable-ci-cd.yml (the one canonical template). This file
# only declares this project's options. Do not inline pipeline steps here.
name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  ci-cd:
    uses: ./.github/workflows/reusable-ci-cd.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      node_version: "20"
      python_version: "3.12"
      test_cmd: npm test
      custom_check_cmd: python3 .github/workflows/check_js_syntax.py
      deploy_target: firebase
      firebase_project: prompt-reconstruction-engine
      smoke_url: https://prompt-reconstruction-engine.web.app/
      smoke_expect_code: "200"
